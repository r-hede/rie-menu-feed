name: Update RIE menu

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Ignorer la fenêtre horaire pour un test manuel"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "*/5 7-11 * * 1-5"

permissions:
  contents: write

concurrency:
  group: rie-menu-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: "Europe/Paris"
      RIE_START_HOUR_PARIS: "9"
      RIE_END_HOUR_PARIS: "12"
      RIE_FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.force == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch RIE menu
        run: node scripts/fetch-rie-menu.mjs

      - name: Commit menu if changed
        run: |
          if git diff --quiet docs; then
            echo "No update."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update RIE menu"
          git push
